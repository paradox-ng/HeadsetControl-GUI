name: build

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

jobs:
  appimage:
    # Build on an older Ubuntu so the AppImage runs on a wide range of distros
    # (it links against that runner's glibc).
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Qt runtime libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 \
            libfontconfig1 libfreetype6 libglib2.0-0

      - name: Build AppImage
        run: bash packaging/build_appimage.sh

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: HeadsetControl-GUI-x86_64.AppImage
          path: dist/HeadsetControl-GUI-x86_64.AppImage
          if-no-files-found: error

  release:
    needs: appimage
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - name: Download AppImage
        uses: actions/download-artifact@v4
        with:
          name: HeadsetControl-GUI-x86_64.AppImage
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/HeadsetControl-GUI-x86_64.AppImage
          generate_release_notes: true
